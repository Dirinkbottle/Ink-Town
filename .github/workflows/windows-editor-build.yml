name: Build Windows Editor (x64)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: windows-editor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: Build Windows x64 Editor EXE
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Run Rust core tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri Windows installer (NSIS EXE)
        run: node node_modules/@tauri-apps/cli/tauri.js build --features desktop --bundles nsis --target x86_64-pc-windows-msvc

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ink-town-editor-windows-x64-exe
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
