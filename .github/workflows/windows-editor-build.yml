name: Build Windows Apps (x64)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: windows-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: Build Windows x64 Editor + Game EXE
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            editor/src-tauri -> editor/src-tauri/target
            game -> game/target
            shared/world-core -> shared/world-core/target
            shared/sim-core -> shared/sim-core/target

      - name: Install frontend dependencies
        run: npm ci
        working-directory: editor

      - name: Run frontend tests
        run: npm run test
        working-directory: editor

      - name: Run Rust tests
        run: npm run rust:test
        working-directory: editor

      - name: Build Tauri Windows installer (NSIS EXE)
        run: node node_modules/@tauri-apps/cli/tauri.js build --features desktop --bundles nsis --target x86_64-pc-windows-msvc
        working-directory: editor

      - name: Build Game Windows EXE
        run: cargo build --release --target x86_64-pc-windows-msvc --manifest-path game/Cargo.toml

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -Path artifacts -ItemType Directory -Force | Out-Null

          $editorCandidates = @()
          $editorCandidates += Get-ChildItem -Path "editor/src-tauri/target" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "[\\/]+bundle[\\/]+nsis[\\/]+" }
          $editorCandidates += Get-ChildItem -Path "target" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "[\\/]+bundle[\\/]+nsis[\\/]+" }
          $editorInstaller = $editorCandidates | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $editorInstaller) {
            Write-Error "Editor installer not found under target/**/bundle/nsis/*.exe."
            exit 1
          }
          Copy-Item $editorInstaller.FullName artifacts/Ink-Town-Editor-x64-Installer.exe -Force

          $gameCandidates = @(
            "target/x86_64-pc-windows-msvc/release/ink-town-game.exe",
            "target/x86_64-pc-windows-msvc/release/ink_town_game.exe",
            "game/target/x86_64-pc-windows-msvc/release/ink-town-game.exe",
            "game/target/x86_64-pc-windows-msvc/release/ink_town_game.exe",
            "target/release/ink-town-game.exe",
            "target/release/ink_town_game.exe"
          )
          $gameExe = $gameCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $gameExe) {
            Write-Error "Game executable not found in expected paths."
            exit 1
          }
          Copy-Item $gameExe artifacts/Ink-Town-Game-x64.exe -Force

      - name: Upload Editor EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ink-town-editor-windows-x64-exe
          path: |
            artifacts/Ink-Town-Editor-x64-Installer.exe
          if-no-files-found: error

      - name: Upload Game EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ink-town-game-windows-x64-exe
          path: |
            artifacts/Ink-Town-Game-x64.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-x64-build-${{ github.run_number }}
          name: Windows x64 Build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/*.exe
